openapi: "3.0.2"
info:
  version: "1.0.0"
  title: "YooMoney API Reference"
  description: "The YooMoney API Reference describes all the YooMoney API methods. The API allows you to process online payments via different methods and make payouts. More about integration via the YooMoney API: Integration guide: https://yookassa.ru/developers: description of payment solutions based on the YooMoney API as well as links to detailed instructions.; Interaction format: https://yookassa.ru/developers/using-api/interaction-format: description of request formats, requirements for request authentication and idempotency key, specifics of response processing.; OpenAPI specification: https://yookassa.ru/developers/using-api/openapi-specification: information about the YooMoney API specification, link for downloading the specification in the YAML format.; Ready-made SDK: https://yookassa.ru/developers/using-api/using-sdks: links to ready-made solutions for PHP, Python, and other programming languages.; Incoming notifications: https://yookassa.ru/developers/using-api/webhooks: description of the operating procedure for notifications (webhook, callback) sent to track object statuses. YooMoney API changelog: https://yookassa.ru/developers/using-api/changelog"
servers:
- url: "https://api.yookassa.ru/v3"
security:
- BasicAuth: []
- OAuth2: []
tags:
- name: "Payments"
  description: "The API allows you to create, capture, and cancel payments, as well as receive payment information. How to process a payment: https://yookassa.ru/developers/payment-acceptance/getting-started/quick-start"
- name: "Способы оплаты"
  description: "Только для тех, кто использует привязку на нулевую сумму: https://yookassa.ru/developers/payment-acceptance/scenario-extensions/recurring-payments/save-payment-method/save-without-payment для сохранения банковских карт. Способ оплаты — данные платежного средства пользователя. Например, данные банковской карты. С помощью API вы можете создать способ оплаты — сохранить платежные данные в ЮKassa с привязкой к вашему магазину. Также по API вы можете получить актуальную информацию о созданном способе оплаты."
- name: "Счета"
  description: "Счет — это страница ЮKassa, на которой пользователь может ознакомиться с деталями заказа и внести оплату. При переходе к оплате ЮKassa автоматически создаст платеж: https://yookassa.ru/developers/api#payment_object и перенаправит пользователя на страницу с платежной формой. Счет считается оплаченным, если по нему есть один успешный платеж. С помощью API вы можете создать счет и получить о нём актуальную информацию. Подробнее о выставлении счетов по API: https://yookassa.ru/developers/payment-acceptance/scenario-extensions/invoices/basics"
- name: "Возвраты"
  description: "С помощью API можно возвращать платежи — полностью или частично. Порядок возврата зависит от способа оплаты (payment_method) исходного платежа. При оплате банковской картой деньги возвращаются на карту, которая была использована для проведения платежа. Как проводить возвраты: https://yookassa.ru/developers/payment-acceptance/after-the-payment/refunds Часть способов оплаты (например, наличные) не поддерживают возвраты. Какие платежи можно вернуть: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-methods#all"
- name: "Чеки"
  description: "Для тех, кто использует решение ЮKassa для 54-ФЗ: https://yookassa.ru/developers/payment-acceptance/receipts/54fz/basics С помощью API можно получать информацию о чеках, для которых вы отправили данные через ЮKassa."
- name: "Выплаты"
  description: "Payout is a sum of money that you transfer to an individual. Using the API, you can make a payout and get the information about its current status. Payouts are used in the following YooMoney payment solutions: Payouts: https://yookassa.ru/developers/payouts/overview: you, as a company, transfer money to individuals (for example, send cashback to users).; Safe Deal: https://yookassa.ru/developers/solutions-for-platforms/safe-deal/basics: your platform transfers payment from one individual to another as part of a created deal."
- name: "Участники СБП"
  description: "Только для тех, кто делает обычные выплаты, не в рамках Безопасной сделки. Участники СБП — это банки и платежные сервисы, подключенные к СБП (Система быстрых платежей ЦБ РФ). С помощью API ЮKassa вы можете получить актуальный список всех участников СБП. Информация об участниках СБП нужна для проведения выплат через СБП. Как делать выплаты через СБП: https://yookassa.ru/developers/payouts/making-payouts/sbp"
- name: "Персональные данные"
  description: "Только для тех, кто делает обычные выплаты, не в рамках Безопасной сделки. Персональные данные пользователя — это фамилия, имя, отчество пользователя и другие данные о нём. С помощью API вы можете создать персональные данные в ЮKassa (сохранить данные о пользователе) и получить актуальную информацию о статусе персональных данных. Персональные данные пользователя нужны в этих сценариях: выплаты с проверкой получателя: https://yookassa.ru/developers/payouts/scenario-extensions/recipient-check (только для выплат через СБП); выплаты с передачей данных получателя для выписок из реестра: https://yookassa.ru/developers/payouts/scenario-extensions/recipient-data-send."
- name: "Сделки"
  description: "Только для тех, кто использует Безопасную сделку: https://yookassa.ru/developers/solutions-for-platforms/safe-deal/basics. Безопасная сделка — это решение ЮKassa, с помощью которого можно принять оплату от одного участника сделки и перевести ее другому участнику в момент выполнения условий сделки. С помощью API вы можете создать сделку и получить о ней актуальную информацию."
- name: "Webhooks"
  description: "Аутентификация только по OAuth-токену. Доступно в рамках API для партнеров: https://yookassa.ru/developers/solutions-for-platforms/partners-api/basics Webhook — это механизм автоматического оповещения вашей системы о событиях, которые происходят с созданными объектами. Например, ЮKassa может сообщить, когда объект платежа: https://yookassa.ru/developers/api#payment_object, созданный в вашем приложении, перейдет в статус waiting_for_capture. С помощью API вы можете настроить webhook (создать, удалить, просмотреть список созданных) для переданного OAuth-токена. Подробнее об уведомлениях API ЮKassa: https://yookassa.ru/developers/using-api/webhooks"
- name: "Настройки"
  description: "Только для тех, кто использует Сплитование платежей, Партнерскую программу или Выплаты. В ЮKassa у каждого магазина и шлюза есть определенные настройки, которые влияют на интеграцию и проведение платежей и выплат. Настройки доступны в личном кабинете: https://yookassa.ru/my/, но в некоторых платежных решениях ЮKassa важно получать настройки по API. Настройки необходимо узнавать по API в следующих платежных решениях ЮKassa: * Сплитование платежей: https://yookassa.ru/developers/solutions-for-platforms/split-payments/basics — вы можете узнать статус магазина продавца, подключенного к вашей площадке. * Партнерская программа: https://yookassa.ru/developers/solutions-for-platforms/partners-api/basics — вы можете получить справочную информацию о магазине, от имени которого вы выполняете операции, например можете узнать, нужно ли передавать данные для отправки чека. * Выплаты: https://yookassa.ru/developers/payouts/overview — вы можете узнать баланс выплат вашего шлюза."
paths:
  /payments:
    post:
      summary: "Create a payment"
      description: "To accept a payment, you need to create a payment object: https://yookassa.ru/developers/api#payment_object, Payment. It contains all the necessary payment information (amount, currency, and status). Payments have a linear life cycle, going from one status to the next sequentially."
      tags:
      - "Payments"
      parameters:
      - $ref: "#/components/parameters/IdempotenceKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              title: "CreatePaymentRequest"
              properties:
                amount:
                  allOf:
                  - $ref: "#/components/schemas/MonetaryAmount"
                  - description: "Payment amount. Sometimes YooMoney's partners charge additional commission from the users that is not included in this amount. The amount is specified with the currency code. It should match the currency of your subaccount (recipient.gateway_id) if you separate payment flows, or the currency of the account (shopId in the Merchant Profile) if you don't."
                description:
                  allOf:
                  - $ref: "#/components/schemas/Description"
                  - description: "Описание транзакции (не более 128 символов), которое вы увидите в личном кабинете ЮKassa, а пользователь — при оплате. Например: «Оплата заказа № 72 для user@yoomoney.ru»."
                receipt:
                  $ref: "#/components/schemas/ReceiptData"
                recipient:
                  $ref: "#/components/schemas/Recipient"
                payment_token:
                  $ref: "#/components/schemas/PaymentToken"
                payment_method_id:
                  $ref: "#/components/schemas/PaymentMethodId"
                payment_method_data:
                  oneOf:
                  - $ref: "#/components/schemas/PaymentMethodDataBankCard"
                  - $ref: "#/components/schemas/PaymentMethodDataCash"
                  - $ref: "#/components/schemas/PaymentMethodDataSberbank"
                  - $ref: "#/components/schemas/PaymentMethodDataTinkoffBank"
                  - $ref: "#/components/schemas/PaymentMethodDataYooMoney"
                  - $ref: "#/components/schemas/PaymentMethodDataMobileBalance"
                  - $ref: "#/components/schemas/PaymentMethodDataB2bSberbank"
                  - $ref: "#/components/schemas/PaymentMethodDataSbp"
                  - $ref: "#/components/schemas/PaymentMethodDataSberLoan"
                  - $ref: "#/components/schemas/PaymentMethodDataElectronicCertificate"
                  - $ref: "#/components/schemas/PaymentMethodDataSberBnpl"
                  discriminator:
                    propertyName: "type"
                confirmation:
                  oneOf:
                  - $ref: "#/components/schemas/ConfirmationDataRedirect"
                  - $ref: "#/components/schemas/ConfirmationDataExternal"
                  - $ref: "#/components/schemas/ConfirmationDataQr"
                  - $ref: "#/components/schemas/ConfirmationDataEmbedded"
                  - $ref: "#/components/schemas/ConfirmationDataMobileApplication"
                  discriminator:
                    propertyName: "type"
                save_payment_method:
                  $ref: "#/components/schemas/SavePaymentMethodAttribute"
                capture:
                  $ref: "#/components/schemas/Capture"
                client_ip:
                  $ref: "#/components/schemas/ClientIp"
                metadata:
                  $ref: "#/components/schemas/Metadata"
                airline:
                  allOf:
                  - $ref: "#/components/schemas/Airline"
                  - description: "Object containing the data for selling airline tickets. Used only for bank card payments."
                transfers:
                  description: "Information about money distribution: the amounts of transfers and the stores to be transferred to. Specified if you use Split payments: https://yookassa.ru/developers/solutions-for-platforms/split-payments/basics."
                  type: "array"
                  items:
                    $ref: "#/components/schemas/TransferDataPayment"
                deal:
                  allOf:
                  - $ref: "#/components/schemas/PaymentDealInfo"
                  - description: "The deal within which the payment is being carried out. Specified if you use Safe deal: https://yookassa.ru/developers/solutions-for-platforms/safe-deal/basics."
                merchant_customer_id:
                  allOf:
                  - $ref: "#/components/schemas/MerchantCustomerId"
                  - description: "The identifier of the customer in your system, such as email address or phone number. No more than 200 characters. Specified if you want to save a bank card and offer it for a recurring payment in the YooMoney payment widget: https://yookassa.ru/developers/payment-acceptance/integration-scenarios/widget/basics."
                payment_order:
                  oneOf:
                  - $ref: "#/components/schemas/PaymentOrderDataUtilities"
                  discriminator:
                    propertyName: "type"
                receiver:
                  oneOf:
                  - $ref: "#/components/schemas/ReceiverMobileBalance"
                  - $ref: "#/components/schemas/ReceiverDigitalWallet"
                  - $ref: "#/components/schemas/ReceiverBankAccount"
                  discriminator:
                    propertyName: "type"
                statements:
                  type: "array"
                  description: "Data for sending statements. Required if you want the user to receive a statement after they make a payment. Only one type of statement is currently available: payment overview.  This is the information about a successful payment that YooMoney sends to the user's email address. An overview may be sent if the payment was made via bank cards, SberPay, or FPS. The option to send overviews is available for all integration scenarios: https://yookassa.ru/developers/payment-acceptance/getting-started/selecting-integration-scenario."
                  items:
                    oneOf:
                    - $ref: "#/components/schemas/PaymentOverviewStatementData"
                    discriminator:
                      propertyName: "type"
              required:
              - "amount"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      summary: "List payments"
      description: "Use this request to get a list of payments. You can download payments created over the last 3 years. You can filter the list by specified criteria. More about working with lists: https://yookassa.ru/developers/using-api/lists"
      tags:
      - "Payments"
      parameters:
      - $ref: "#/components/parameters/CreatedGte"
      - $ref: "#/components/parameters/CreatedGt"
      - $ref: "#/components/parameters/CreatedLte"
      - $ref: "#/components/parameters/CreatedLt"
      - in: "query"
        name: "captured_at.gte"
        description: "Filter by time of payment capture: time must be greater than the specified value or equal (\"from a certain moment inclusive\"). Specified in the ISO 8601: https://en.wikipedia.org/wiki/ISO_8601 format. Example: captured_at.gte=2018-07-18T10:51:18.139Z"
        schema:
          type: "string"
          format: "date-time"
      - in: "query"
        name: "captured_at.gt"
        description: "Filter by time of payment capture: time must be greater than the specified value (\"from a certain moment exclusive\"). Specified in the ISO 8601: https://en.wikipedia.org/wiki/ISO_8601 format. Example: captured_at.gt=2018-07-18T10:51:18.139Z"
        schema:
          type: "string"
          format: "date-time"
      - in: "query"
        name: "captured_at.lte"
        description: "Filter by time of payment capture: time must be less than the specified value or equal (\"until a certain moment inclusive\"). Specified in the ISO 8601: https://en.wikipedia.org/wiki/ISO_8601 format. Example: captured_at.lte=2018-07-18T10:51:18.139Z"
        schema:
          type: "string"
          format: "date-time"
      - in: "query"
        name: "captured_at.lt"
        description: "Filter by time of payment capture: time must be less than the specified value (\"until a certain moment exclusive\") Specified in the ISO 8601: https://en.wikipedia.org/wiki/ISO_8601 format. Example: captured_at.lt=2018-07-18T10:51:18.139Z"
        schema:
          type: "string"
          format: "date-time"
      - in: "query"
        name: "payment_method"
        schema:
          $ref: "#/components/schemas/PaymentMethodType"
        required: false
        description: "Filter by payment method: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-methods#all code. Example: payment_method=bank_card"
      - in: "query"
        name: "status"
        schema:
          $ref: "#/components/schemas/PaymentStatus"
        required: false
        description: "Filter by payment status: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-process#lifecycle. Example: status=succeeded"
      - $ref: "#/components/parameters/Limit"
      - $ref: "#/components/parameters/NextCursor"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentList"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /payments/{payment_id}:
    get:
      summary: "Get payment information"
      description: "This request allows you to get the information about the current payment status by its unique ID."
      tags:
      - "Payments"
      parameters:
      - $ref: "#/components/parameters/paymentIdPath"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /payments/{payment_id}/capture:
    post:
      summary: "Capture a payment"
      description: "Confirm you’re ready to accept the payment. Once the payment is captured, the status will change to succeeded. After that, you can provide the customer with the product or service. You can only capture payments with the waiting_for_capture status, and only for a certain amount of time (depending on the payment method). If you do not capture the payment within the allotted time, the status will change to canceled, and the money will be returned to the user. More about capturing and canceling payments: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-process#capture-and-cancel"
      tags:
      - "Payments"
      parameters:
      - $ref: "#/components/parameters/paymentIdPath"
      - $ref: "#/components/parameters/IdempotenceKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: "object"
              title: "PaymentCaptureRequest"
              properties:
                amount:
                  allOf:
                  - $ref: "#/components/schemas/MonetaryAmount"
                  - description: "Total amount that will be debited from the user. You can specify a part of the initial amount to return the balance to the user. To do this, make sure that the selected payment method supports partial debit: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-process#capture-partly. The amount is specified with the currency code. It should match the currency of your subaccount (recipient.gateway_id) if you separate payment flows, or the currency of the account (shopId in the Merchant Profile) if you don't."
                receipt:
                  $ref: "#/components/schemas/ReceiptData"
                airline:
                  allOf:
                  - $ref: "#/components/schemas/Airline"
                  - description: "Object containing the data for selling airline tickets. Used only for bank card payments."
                transfers:
                  description: "Information about money distribution: the amounts of transfers and the stores to be transferred to. Specified for partially capturing a payment if you use Split payments: https://yookassa.ru/developers/solutions-for-platforms/split-payments/basics."
                  type: "array"
                  items:
                    $ref: "#/components/schemas/TransferDataCapture"
                deal:
                  type: "object"
                  description: "The deal within which the payment is being carried out. Specified for partially capturing a payment if you use Safe deal: https://yookassa.ru/developers/solutions-for-platforms/safe-deal/basics."
                  title: "CapturePaymentDeal"
                  properties:
                    settlements:
                      $ref: "#/components/schemas/SettlementPaymentArray"
                  required:
                  - "settlements"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /payments/{payment_id}/cancel:
    post:
      summary: "Cancel a payment"
      description: "Cancel payments with the waiting_for_capture status. Payment cancelation means you are not ready to dispatch a product or to provide a service to the user. Once you cancel the payment, we will start returning the money to the payer’s account. If the payment was made from a bank card, a YooMoney wallet, or via SberPay, the money will be refunded instantly. If the payment was made using other payment methods, the process can take up to several days. More about capturing and canceling payments: https://yookassa.ru/developers/payment-acceptance/getting-started/payment-process#capture-and-cancel"
      parameters:
      - $ref: "#/components/parameters/paymentIdPath"
      - $ref: "#/components/parameters/IdempotenceKey"
      tags:
      - "Payments"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /payment_methods:
    post:
      summary: "Создание способа оплаты"
      description: "Используйте этот запрос, чтобы создать в ЮKassa объект способа оплаты: https://yookassa.ru/developers/api#payment_method_object. В запросе необходимо передать код способа оплаты, который вы хотите сохранить, и при необходимости дополнительные параметры, связанные с той функциональностью, которую вы хотите использовать. Идентификатор созданного способа оплаты вы можете использовать при проведении автоплатежей: https://yookassa.ru/developers/payment-acceptance/scenario-extensions/recurring-payments/create-recurring или выплат: https://yookassa.ru/developers/payouts/scenario-extensions/multipurpose-token."
      tags:
      - "Способы оплаты"
      parameters:
      - $ref: "#/components/parameters/IdempotenceKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: "#/components/schemas/SavePaymentMethodDataBankCard"
              discriminator:
                propertyName: "type"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/SavePaymentMethodBankCard"
                discriminator:
                  propertyName: "type"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"
  /payment_methods/{payment_method_id}:
    get:
      summary: "Информация о способе оплаты"
      description: "Используйте этот запрос, чтобы получить информацию о текущем состоянии способа оплаты по его уникальному идентификатору."
      tags:
      - "Способы оплаты"
      parameters:
      - $ref: "#/components/parameters/paymentMethodIdPath"
      responses:
        "200":
          description: "Запрос успешно обработан"
          content:
            application/json:
              schema:
                oneOf:
                - $ref: "#/components/schemas/SavePaymentMethodBankCard"
                discriminator:
                  propertyName: "type"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/InvalidCredentials"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
